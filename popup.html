<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kendra Bindu</title>
    <!-- Use Tailwind CSS for easy styling -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        body { width: 400px; padding: 1.5rem; font-family: 'Inter', sans-serif; background-color: #f7fafc; }
    </style>

    
</head>
<body class="bg-gray-100 p-6 rounded-lg shadow-lg">
    <h1 class="text-2xl font-bold text-gray-800 mb-4 text-center">Kendra Bindu</h1>

    <!-- Focus Mode Toggle Section -->
    <div class="flex items-center justify-between mb-4">
        <span class="text-lg font-semibold text-gray-700">Focus Mode</span>
        <label class="switch relative inline-block w-12 h-6">
            <input type="checkbox" id="focusModeToggle" class="hidden">
            <span class="slider absolute cursor-pointer top-0 left-0 right-0 bottom-0 bg-gray-300 rounded-full transition-colors duration-300 before:absolute before:h-5 before:w-5 before:left-0.5 before:bottom-0.5 before:bg-white before:rounded-full before:transition-transform before:duration-300"></span>
        </label>
    </div>

    <!-- Allow List Section -->
    <div class="mb-4">
        <label for="allowList" class="block text-sm font-medium text-gray-700 mb-1">Allow List (Keywords/URLs)</label>
        <textarea id="allowList" rows="3" placeholder="Add keywords, one per line (e.g., [youtube.com/tutorials](https://youtube.com/tutorials), coursera.org)" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"></textarea>
    </div>

    <!-- Block List Section -->
    <div class="mb-4">
        <label for="blockList" class="block text-sm font-medium text-gray-700 mb-1">Block List (Keywords/URLs)</label>
        <textarea id="blockList" rows="3" placeholder="Add keywords, one per line (e.g., [youtube.com/gaming](https://youtube.com/gaming), twitter.com)" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200"></textarea>
    </div>

    <!-- Save Button -->
    <button id="saveButton" class="w-full py-2 px-4 bg-blue-600 text-white font-semibold rounded-md hover:bg-blue-700 focus:ring-4 focus:ring-blue-500 focus:ring-opacity-50 transition-colors duration-200">Save Lists</button>
    
    <!-- Status Message -->
    <p id="statusMessage" class="mt-4 text-sm text-center text-gray-600"></p>

    <!-- Custom CSS for the toggle switch -->
    <style>
        #focusModeToggle:checked + .slider { background-color: #2563eb; }
        #focusModeToggle:checked + .slider:before { transform: translateX(1.5rem); }
    </style>

    <script src="popup.js"></script>
</body>
</html>
